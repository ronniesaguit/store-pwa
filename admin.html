<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tindahan Hub — Admin</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f3f4f6;color:#111827;min-height:100vh}
  #app{max-width:600px;margin:0 auto;padding:0 0 80px}
  .screen{padding:12px}
  .topbar{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:#1e3a5f;color:#fff;margin:-12px -12px 12px}
  .topbar .title{font-size:16px;font-weight:bold}
  .card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:12px;font-weight:bold;color:#374151;margin-bottom:4px}
  .field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:14px}
  .field textarea{resize:vertical;min-height:60px}
  .btn{display:block;width:100%;padding:13px;border:none;border-radius:10px;font-size:15px;font-weight:bold;cursor:pointer;margin-bottom:8px}
  .btn-primary{background:#1e3a5f;color:#fff}
  .btn-secondary{background:#f3f4f6;color:#374151;border:1px solid #e5e7eb}
  .btn-danger{background:#dc2626;color:#fff}
  .btn-success{background:#16a34a;color:#fff}
  .btn-sm{padding:6px 12px;font-size:13px;border-radius:8px;border:none;cursor:pointer;font-weight:bold}
  .small-btn{padding:7px 14px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:8px;font-size:13px;cursor:pointer}
  .badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:bold}
  .badge-active{background:#dcfce7;color:#15803d}
  .badge-trial{background:#dbeafe;color:#1d4ed8}
  .badge-expired{background:#fee2e2;color:#dc2626}
  .badge-suspended{background:#f3f4f6;color:#6b7280}
  .store-row{padding:12px 0;border-bottom:1px solid #f3f4f6;cursor:pointer}
  .store-row:last-child{border-bottom:none}
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
  .stat-card{background:#f9fafb;border-radius:10px;padding:12px;text-align:center}
  .stat-card .val{font-size:22px;font-weight:bold;color:#1e3a5f}
  .stat-card .lbl{font-size:11px;color:#6b7280;margin-top:2px}
  .muted{color:#6b7280;font-size:13px}
  .msg-ok{background:#dcfce7;color:#15803d;padding:10px 12px;border-radius:8px;font-size:13px;margin-bottom:10px}
  .msg-err{background:#fee2e2;color:#dc2626;padding:10px 12px;border-radius:8px;font-size:13px;margin-bottom:10px}
  .tabs{display:flex;gap:4px;margin-bottom:12px}
  .tab{flex:1;padding:8px;text-align:center;background:#f3f4f6;border-radius:8px;font-size:13px;cursor:pointer;border:none}
  .tab.active{background:#1e3a5f;color:#fff;font-weight:bold}
  .hint{font-size:11px;color:#6b7280;margin-top:4px}
  .section-title{font-size:13px;font-weight:bold;color:#374151;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid #f3f4f6}
  input[type=checkbox]{width:auto;margin-right:6px}
</style>
</head>
<body>
<div id="app"><div style="text-align:center;padding:60px 20px;color:#6b7280;">Loading…</div></div>
<script src="api.js"></script>
<script src="admin.js"></script>
</body>
</html>
