  <g transform="translate(292 90)">
    <text x="0" y="94" font-family="Segoe UI, Arial, sans-serif" font-size="100" font-weight="800" fill="url(#wordSuite)">Hub<tspan fill="#2ca43a">Suite</tspan></text>
    <rect x="420" y="18" width="116" height="40" rx="20" fill="#f59e0b"/>
    <text x="478" y="45" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="800" fill="#ffffff">TRIAL</text>
    <text x="2" y="148" font-family="Georgia, Times New Roman, serif" font-size="34" font-style="italic" fill="#4b5563">Explore the suite before choosing your Hub tier.</text>
