<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
  <title id="title">HubSuite Trial</title>
  <desc id="desc">HubSuite trial logo with a trial badge.</desc>
  <defs>
    <linearGradient id="pinSuite" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="wordSuite" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#2ca43a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.15"/>
    </filter>
  </defs>

  <g filter="url(#shadow)" transform="translate(48 28)">
    <path d="M104 0C53 0 12 41 12 92c0 60 65 118 92 140 27-22 92-80 92-140C196 41 155 0 104 0Z" fill="url(#pinSuite)"/>
    <circle cx="104" cy="92" r="70" fill="#eff6ff"/>
    <path d="M104 52 68 74 68 112 104 134 140 112 140 74Z" fill="none" stroke="#ffffff" stroke-width="8" stroke-linejoin="round"/>
    <circle cx="104" cy="92" r="16" fill="#ffffff"/>
    <line x1="104" y1="52" x2="104" y2="76" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
    <line x1="68" y1="74" x2="88" y2="86" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
    <line x1="68" y1="112" x2="88" y2="100" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
    <line x1="140" y1="74" x2="120" y2="86" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
    <line x1="140" y1="112" x2="120" y2="100" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
    <rect x="92" y="34" width="24" height="24" rx="4" fill="#fbbf24" stroke="#ffffff" stroke-width="4"/>
    <rect x="42" y="64" width="24" height="24" rx="4" fill="#fb923c" stroke="#ffffff" stroke-width="4"/>
    <rect x="42" y="120" width="24" height="24" rx="4" fill="#f59e0b" stroke="#ffffff" stroke-width="4"/>
    <rect x="142" y="64" width="24" height="24" rx="4" fill="#84cc16" stroke="#ffffff" stroke-width="4"/>
    <rect x="142" y="120" width="24" height="24" rx="4" fill="#22c55e" stroke="#ffffff" stroke-width="4"/>
