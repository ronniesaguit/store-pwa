<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
  <title id="title">Nexora Hub</title>
  <desc id="desc">Nexora Hub brand logo with a growth and network marker icon.</desc>
  <defs>
    <linearGradient id="pinDeep" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="graphGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#84cc16"/>
    </linearGradient>
    <linearGradient id="wordGrad" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.15"/>
    </filter>
  </defs>

  <g filter="url(#shadow)" transform="translate(50 28)">
    <path d="M104 0C53 0 12 41 12 92c0 60 65 118 92 140 27-22 92-80 92-140C196 41 155 0 104 0Z" fill="url(#pinDeep)"/>
    <circle cx="104" cy="92" r="70" fill="#eff6ff"/>
    <path d="M52 154V86" fill="none" stroke="#93c5fd" stroke-width="8" stroke-linecap="round"/>
    <rect x="60" y="126" width="20" height="28" rx="3" fill="#f59e0b"/>
    <rect x="86" y="112" width="20" height="42" rx="3" fill="#fbbf24"/>
    <rect x="112" y="92" width="20" height="62" rx="3" fill="#84cc16"/>
    <rect x="138" y="74" width="20" height="80" rx="3" fill="#65a30d"/>
    <path d="M52 74l42-25 34 17 34-29" fill="none" stroke="#60a5fa" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="52" cy="74" r="12" fill="#f97316" stroke="#ffffff" stroke-width="5"/>
    <circle cx="94" cy="49" r="12" fill="#fbbf24" stroke="#ffffff" stroke-width="5"/>
    <circle cx="128" cy="66" r="12" fill="#60a5fa" stroke="#ffffff" stroke-width="5"/>
    <circle cx="162" cy="37" r="12" fill="#93c5fd" stroke="#ffffff" stroke-width="5"/>
  </g>

  <g transform="translate(290 88)">
    <text x="0" y="96" font-family="Segoe UI, Arial, sans-serif" font-size="98" font-weight="800" fill="url(#wordGrad)">Nexora<tspan fill="#16a34a">Hub</tspan></text>
    <text x="2" y="150" font-family="Georgia, Times New Roman, serif" font-size="34" font-style="italic" fill="#6b7280">Intelligent tools for business expansion.</text>
